services:
  server:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app:z
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development

    command: sh -c "npm install && npx prisma generate && npm run dev"

  client:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app:z
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
